<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Upper Body Training</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#111;min-height:100vh;padding:1.5rem 1rem 3rem}.container{max-width:420px;margin:0 auto}h1{font-size:20px;font-weight:600;margin-bottom:1.5rem}.progress-bar{display:flex;gap:5px;margin-bottom:1.5rem;flex-wrap:wrap}.prog-dot{height:6px;flex:1;min-width:14px;border-radius:3px;background:#ddd;transition:background 0.3s;cursor:pointer}.prog-dot.done{background:#1D9E75}.prog-dot.active{background:#185FA5}.video-wrapper{position:relative;width:100%;max-width:320px;margin:0 auto 1rem;aspect-ratio:9/16;background:#000;border-radius:12px;overflow:hidden}.video-wrapper iframe{width:100%;height:100%;border:none;display:block}.info-row{margin-bottom:1rem}.exercise-label{font-size:13px;color:#666;margin-bottom:2px}.exercise-name{font-size:20px;font-weight:600;margin-bottom:8px}.badges{display:flex;gap:8px;flex-wrap:wrap}.badge{display:inline-block;font-size:14px;font-weight:700;padding:4px 14px;border-radius:20px}.badge-sets{background:#1D9E75;color:#fff}.badge-reps{background:#185FA5;color:#fff}.btn-row{display:flex;gap:10px;margin-top:1.2rem}.btn{flex:1;padding:12px 16px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#111;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}.btn:hover{background:#f0f0f0}.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}.btn.primary:hover{background:#0C447C}.btn:disabled{opacity:0.35;cursor:not-allowed}.done-banner{background:#fff;border:1px solid #1D9E75;border-radius:12px;padding:2rem 1rem;text-align:center;display:none}.done-banner h2{font-size:20px;margin-bottom:0.5rem}.done-banner p{color:#666;font-size:14px;margin-bottom:1rem}</style></head>
<body><div class="container"><h1>Upper Body Training</h1><div class="progress-bar" id="progressBar"></div><div class="video-wrapper" id="videoWrapper"><iframe id="ytFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe></div><div class="info-row"><div class="exercise-label" id="exerciseLabel"></div><div class="exercise-name" id="exerciseName"></div><div class="badges" id="badges"><span class="badge badge-sets">2/3 SETS</span><span class="badge badge-reps">10 REPS</span></div></div><div class="btn-row"><button class="btn" id="btnPrev" onclick="changeVideo(-1)">&#8592; Previous</button><button class="btn primary" onclick="changeVideo(1)">Next &#8594;</button></div><div class="done-banner" id="doneBanner"><div style="font-size:48px;color:#1D9E75;margin-bottom:0.5rem;">✓</div><h2>Training complete!</h2><p>All exercises completed. Great work!</p><button class="btn primary" onclick="restartTraining()" style="margin:0 auto;max-width:200px;">↺ Repeat</button></div></div>
<script>
const exercises=[{name:"Upper Body - Exercise 1",id:"zOKrMO4yiEo"},{name:"Upper Body - Exercise 2",id:"ajsF7NVSCNI"},{name:"Upper Body - Exercise 3",id:"wEjorOVOLaU"},{name:"Upper Body - Exercise 4",id:"GgoqGqopyXY"},{name:"Upper Body - Exercise 5",id:"o89WrY788Bk"},{name:"Upper Body - Exercise 6",id:"xKYwNwIlc04"}];
let current=0;
function buildProgress(){const bar=document.getElementById('progressBar');bar.innerHTML='';exercises.forEach((_,i)=>{const d=document.createElement('div');d.className='prog-dot'+(i<current?' done':i===current?' active':'');d.onclick=()=>goTo(i);bar.appendChild(d);});}
function goTo(idx){current=idx;render();}
function render(){const ex=exercises[current];document.getElementById('ytFrame').src='https://www.youtube.com/embed/'+ex.id+'?rel=0&modestbranding=1';document.getElementById('exerciseLabel').textContent='Exercise '+(current+1)+' of '+exercises.length;document.getElementById('exerciseName').textContent=ex.name;document.getElementById('btnPrev').disabled=current===0;document.getElementById('videoWrapper').style.display='block';document.getElementById('doneBanner').style.display='none';document.getElementById('badges').style.display='flex';buildProgress();}
function changeVideo(dir){const next=current+dir;if(next<0)return;if(next>=exercises.length){document.getElementById('videoWrapper').style.display='none';document.getElementById('doneBanner').style.display='block';document.getElementById('badges').style.display='none';document.getElementById('progressBar').querySelectorAll('.prog-dot').forEach(d=>d.className='prog-dot done');return;}goTo(next);}
function restartTraining(){current=0;render();}
render();
</script></body></html>
